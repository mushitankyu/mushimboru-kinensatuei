<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ムシンボル | 昆虫本質診断</title>
    <style>
        :root {
            --primary-bg: #0b140d;
            --accent-color: #a3d133;
            --text-color: #e0e0e0;
            --card-bg: rgba(20, 30, 25, 0.95);
            --cam-btn-color: #00bfff; 
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', sans-serif;
            background-color: var(--primary-bg);
            color: var(--text-color);
            overflow: hidden; 
        }

        .forest-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, #0b140d 0%, #1a2e1d 50%, #050a05 100%);
            z-index: -1;
        }

        .container {
            display: flex; justify-content: center; align-items: center;
            height: 100vh; width: 100vw; padding: 20px; box-sizing: border-box;
            position: relative;
        }

        .screen {
            background: var(--card-bg); backdrop-filter: blur(20px);
            padding: clamp(20px, 5vw, 40px); border-radius: 8px;
            width: 90%; max-width: 650px;
            height: 500px; 
            border: 1px solid rgba(255,255,255,0.05);
            box-shadow: 0 30px 60px rgba(0,0,0,0.7);
            display: none; 
            text-align: center;
            box-sizing: border-box;
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        #result-screen { height: auto; min-height: 500px; max-height: 90vh; overflow-y: auto; justify-content: flex-start; padding-top: 40px; }
        #camera-screen { width: 100vw; height: 100vh; max-width: none; border-radius: 0; padding: 0; background: #000; z-index: 100; }

        .active { display: flex !important; animation: fadeIn 0.6s forwards; }

        .logo-area h1 {
            font-size: clamp(2rem, 10vw, 4.5rem); 
            letter-spacing: clamp(5px, 3vw, 15px); 
            margin: 0;
            color: #fff; text-shadow: 0 0 25px rgba(163, 209, 51, 0.5); font-weight: 100;
            width: 100%; white-space: nowrap;
        }
        .subtitle { color: var(--accent-color); letter-spacing: 5px; margin-top: 10px; font-weight: 300; }

        .progress-bar { height: 2px; background: #222; margin-bottom: 20px; width: 100%; }
        .progress-fill { height: 100%; background: var(--accent-color); width: 0%; transition: width 0.3s; }

        .question-text { font-size: clamp(1.1rem, 4.5vw, 1.4rem); font-weight: bold; line-height: 1.5; margin-bottom: 25px; min-height: 3.5em; display: flex; align-items: center; justify-content: center; width: 100%; }
        .options { display: flex; flex-direction: column; gap: 10px; width: 100%; }
        .opt-btn { padding: 15px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); color: #ccc; border-radius: 4px; cursor: pointer; font-size: 0.95rem; text-align: left; transition: all 0.3s; line-height: 1.4; min-height: 55px; }
        .opt-btn:hover { background: rgba(163, 209, 51, 0.15); border-color: var(--accent-color); color: #fff; }

        .back-btn { margin-top: 20px; background: transparent; border: none; color: #666; cursor: pointer; font-size: 0.8rem; text-decoration: underline; letter-spacing: 1px; visibility: hidden; }

        .insect-name { font-size: clamp(2rem, 6vw, 3rem); margin: 5px 0; color: #fff; font-family: serif; }
        .photo-container { width: 100%; height: auto; max-height: 250px; overflow: hidden; border-radius: 4px; margin: 10px 0; border: 1px solid #333; background: #000; display: flex; justify-content: center; align-items: center; }
        .insect-photo { width: 100%; height: 100%; object-fit: contain; }

        .start-btn { margin-top: 30px; padding: 15px 50px; background: transparent; border: 1px solid var(--accent-color); color: var(--accent-color); cursor: pointer; font-size: 1rem; letter-spacing: 2px; transition: 0.4s; align-self: center; }
        .start-btn:hover { background: var(--accent-color); color: #000; box-shadow: 0 0 20px var(--accent-color); }

        .cam-btn { border-color: var(--cam-btn-color); color: var(--cam-btn-color); margin-top: 15px; }
        .cam-btn:hover { background: var(--cam-btn-color); color: #000; box-shadow: 0 0 20px var(--cam-btn-color); }

        .warning-text { margin-top: 35px; color: #ff4d4d; font-size: 0.85rem; font-weight: bold; text-align: center; width: 100%; }
        
        .mbti-badge { color: var(--accent-color); font-weight: bold; letter-spacing: 3px; font-size: 1.4rem; }
        .type-intro { font-size: 0.9rem; color: #aaa; margin-top: 2px; letter-spacing: 1px; }

        .camera-wrapper { position: relative; width: 100%; height: 100%; overflow: hidden; background: #000; }
        #video { width: 100%; height: 100%; object-fit: cover; transition: transform 0.2s; position: absolute; top: 0; left: 0; }
        
        .insect-overlay { 
            position: absolute; 
            bottom: 80px; 
            right: 0px; 
            width: 300px; 
            height: 300px; 
            background: transparent; 
            border: none; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            pointer-events: none; 
            z-index: 101; 
        }

        #overlay-img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            mix-blend-mode: multiply; 
            display: none; 
        }

        .zoom-controls { position: absolute; bottom: 140px; left: 0; width: 100%; display: flex; justify-content: center; gap: 10px; z-index: 102; }
        .zoom-btn { background: rgba(0,0,0,0.6); border: 1px solid #fff; color: #fff; border-radius: 50%; width: 45px; height: 45px; font-size: 0.8rem; cursor: pointer; }

        .cam-controls { position: absolute; bottom: 40px; width: 100%; display: flex; justify-content: space-around; align-items: center; z-index: 102; }
        .shutter { width: 70px; height: 70px; border-radius: 50%; background: #fff; border: 5px solid rgba(163, 209, 51, 0.5); cursor: pointer; }

        @keyframes fadeIn { from { opacity: 0; transform: translate(-50%, -48%); } to { opacity: 1; transform: translate(-50%, -50%); } }
    </style>
</head>
<body>

<div class="forest-bg"></div>
<div class="container">
    <div id="home-screen" class="screen active">
        <div class="logo-area"><h1>MUSHIMBOL</h1><p class="subtitle">― 本質探求版 ―</p></div>
        <button class="start-btn" onclick="startApp()">診 断 を 開 始</button>
        <div class="warning-text">最後に虫の写真が表示されます。ご注意ください。</div>
    </div>

    <div id="quiz-screen" class="screen">
        <div class="progress-bar"><div id="progress" class="progress-fill"></div></div>
        <div id="status-text" style="font-size: 0.8rem; color: #a3d133; margin-bottom: 10px; letter-spacing: 2px; text-transform: uppercase;">Analyzing...</div>
        <div id="q-text" class="question-text"></div>
        <div class="options">
            <button class="opt-btn" id="btnA" onclick="handleAnswer('A')"></button>
            <button class="opt-btn" id="btnB" onclick="handleAnswer('B')"></button>
        </div>
        <button id="back-button" class="back-btn" onclick="goBack()">ひとつ前の質問に戻る</button>
    </div>

    <div id="result-screen" class="screen">
        <p style="color: var(--accent-color); font-weight: bold; letter-spacing: 2px; margin-bottom: 5px;">YOUR SYMBOL</p>
        <div id="res-mbti" class="mbti-badge"></div>
        <div id="res-intro" class="type-intro"></div>
        <h2 class="insect-name" id="res-name"></h2>
        <div class="photo-container"><img id="res-img" class="insect-photo" src="" alt=""></div>
        <p id="res-desc" style="line-height: 1.8; text-align: left; margin: 20px 0; color: #bbb;"></p>
        <button class="start-btn cam-btn" onclick="openCamera()">君のマッチした虫と記念撮影をしよう！</button>
        <button class="start-btn" onclick="location.reload()">最初に戻る</button>
    </div>

    <div id="camera-screen" class="screen">
        <div class="camera-wrapper">
            <video id="video" autoplay playsinline></video>
            <div class="zoom-controls">
                <button class="zoom-btn" onclick="applyZoom(0.6)">0.6x</button>
                <button class="zoom-btn" onclick="applyZoom(1.0)">1.0x</button>
                <button class="zoom-btn" onclick="applyZoom(2.0)">2.0x</button>
            </div>
            <div class="insect-overlay">
                <img id="overlay-img" src="" alt="">
            </div>
            <div class="cam-controls">
                <button class="start-btn" style="margin:0; padding:10px 20px; border-color:#fff; color:#fff;" onclick="closeCamera()">戻る</button>
                <button class="shutter" onclick="takePhoto()"></button>
                <button class="start-btn" style="margin:0; padding:10px 20px; border-color:#fff; color:#fff;" onclick="switchCamera()">内外反転</button>
            </div>
        </div>
        <canvas id="canvas" style="display:none;"></canvas>
    </div>
</div>

<script>
    const insectDB = { 
        "A1": { name: "ノコギリクワガタ", wiki: "ノコギリクワガタ", intro: "プライド高き戦士", desc: "プライド高き戦士。実力行使も辞さない力強い意志を持ち、勝利を掴むために果敢に挑みます。", img: "kuwagata.png" }, 
        "A2": { name: "タガメ", wiki: "タガメ", intro: "水中の支配者", desc: "水中の支配者。チャンスを逃さず、静かに、しかし確実に標的を捕らえる圧倒的な集中力を持っています。", img: "tagame.png" }, 
        "A3": { name: "ハキリアリ", wiki: "ハキリアリ", intro: "組織の改革者", desc: "組織の改革者。巨大なシステムを効率的に動かし、チームのために新しい価値を生み出す力に長けています。", img: "hakiriari.png" }, 
        "A4": { name: "アメンボ", wiki: "アメンボ", intro: "軽快なスピードスター", desc: "軽快なスピードスター。誰よりも早く変化を察知し、水面を滑るように自由に移動する柔軟性を持っています。", img: "amenbo.png" }, 
        "B1": { name: "ミノムシ", wiki: "ミノガ", intro: "内省の求道者", desc: "内省の求道者。外の世界の喧騒を遮断し、自分だけの「完璧な世界」をコツコツと築き上げる忍耐強い性格です。", img: "minomushi.png" }, 
        "B2": { name: "コノハムシ", wiki: "コノハムシ", intro: "究極の適応者", desc: "究極の適応者。環境に完璧に溶け込み、時が来るまで静かに待ち続ける、守りの知恵を持っています。", img: "konohamushi.png" }, 
        "B3": { name: "フンコロガシ", wiki: "スカラベ", intro: "不屈の探求者", desc: "不屈の探求者。たとえ泥臭い努力であっても、自分の大切な「宝」のために一途に突き進む情熱を持っています。", img: "hunnkorogashi.png" }, 
        "B4": { name: "ゲンゴロウ", wiki: "ゲンゴロウ", intro: "多才な遊泳者", desc: "多才な遊泳者。二つの異なる世界を器用に渡り歩き、どんな環境でも自分を失わずに活動できるバイタリティがあります。", img: "genngorou.png" }, 
        "ESTJ": { name: "スズメバチ", wiki: "スズメバチ", intro: "厳格なリーダー", desc: "秩序を守る厳格なリーダー。規律と正義を重んじ、集団を導きます。", img: "suzumebati.png" }, 
        "ISTJ": { name: "働きアリ", wiki: "アリ", intro: "誠実な努力家", desc: "誠実な努力家。一歩ずつ着実に任務を遂行し、社会を支えます。", img: "hatarakiari.png" }, 
        "ESFJ": { name: "ミツバチ", wiki: "ミツバチ", intro: "献身的な支え", desc: "献身的な支え。仲間のために尽くす最高の調整役です。", img: "mitubati.png" }, 
        "ISFJ": { name: "カイコガ", wiki: "カイコ", intro: "慈愛の守護者", desc: "慈愛の守護者。控えめですが周囲を温かく守ります。", img: "kaiko.png" }, 
        "ESTP": { name: "トノサマバッタ", wiki: "トノサマバッタ", intro: "抜群の勝負師", desc: "行動力抜群の勝負師。今この瞬間を全力で生きる。", img: "tonosamabatta.png" }, 
        "ISTP": { name: "カマキリ", wiki: "カマキリ", intro: "職人気質の孤高のハンター", desc: "職人気質の孤高のハンター。冷静に技術を磨きます。", img: "kamakiri.png" }, 
        "ESFP": { name: "セミ", wiki: "セミ", intro: "明るいパフォーマー", desc: "明るいパフォーマー。周囲にエネルギーを振りまきます。", img: "semi.png" }, 
        "ISFP": { name: "ナナフシ", wiki: "ナナフシ", intro: "静かな芸術家", desc: "静かな芸術家。自分の世界を大切にする平和主義者。", img: "nanahushi.png" }, 
        "ENTJ": { name: "オニヤンマ", wiki: "オニヤンマ", intro: "圧倒的カリスマ", desc: "圧倒的カリスマ。高い目標に向かい効率的に進みます。", img: "oniyannma.png" }, 
        "INTJ": { name: "ジョロウグモ", wiki: "ジョロウグモ", intro: "緻密な知略家", desc: "緻密な知略家。未来を予測し、完璧な罠を張ります。", img: "zyorougumo.png" }, 
        "ENTP": { name: "カブトムシ", wiki: "カブトムシ", intro: "好奇心の開拓者", desc: "好奇心旺盛な開拓者。常に新しい挑戦を求めます。", img: "kabutomushi.png" }, 
        "INTP": { name: "ゴミムシダマシ", wiki: "ゴミムシダマシ", intro: "真理を追う哲学者", desc: "真理を追う哲学者。独自の理論を深める探求者。", img: "gomimushidamashi.png" }, 
        "ENFJ": { name: "アゲハチョウ", wiki: "アゲハチョウ", intro: "希望を導く光", desc: "人々を導く希望の光。理想を共有し共感を広げます。", img: "agehatyou.png" }, 
        "INFJ": { name: "オオカバマダラ", wiki: "オオカバマダラ", intro: "洞察ある巡礼者", desc: "洞察力ある巡礼者。静かな情熱で理想を追います。", img: "ookabamadara.png" }, 
        "ENFP": { name: "テントウムシ", wiki: "テントウムシ", intro: "可能性を信じる自由人", desc: "可能性を信じる自由人。ワクワクを広める愛されキャラ。", img: "tenntoumushi.png" }, 
        "INFP": { name: "ホタル", wiki: "ホタル", intro: "理想を抱く夢想家", desc: "理想を抱く夢想家。自分だけの光を静かに守ります。", img: "hotaru.png" } 
    };

    const branchQuestion = { q: "あなたは、どっちのタイプ？", a: "現状を打破し、新しい世界を自ら作り上げたい", b: "自分を研ぎ澄まし、深い安らぎと調和を見つけたい" };
    const pathAQuestions = [{q:"勝負をするなら？",a:"正面から堂々と戦う",b:"裏をかいて賢く勝つ",type:"T"},{q:"リーダーの役割は？",a:"明確なビジョンを示すこと",b:"メンバーの能力を引き出すこと",type:"E"},{q:"失敗した時",a:"すぐに別の方法を試す",b:"原因を徹底的に分析する",type:"J"},{q:"未知の分野への挑戦は？",a:"ワクワクして飛び込む",b:"入念に準備してから挑む",type:"S"},{q:"評価されるならどっち？",a:"「個人の実力」",b:"「組織への貢献」",type:"T"},{q:"休息の仕方は？",a:"スポーツや外出で発散する",b:"家で戦略を練り直す",type:"E"},{q:"他人のミスに対しては？",a:"ハッキリと指摘する",b:"フォローして次に繋げる",type:"F"},{q:"自分のアイデアは？",a:"すぐに実行して形にしたい",b:"じっくり温めて完璧にしたい",type:"P"},{q:"人との関わり方は？",a:"広く浅く多くの情報を得たい",b:"信頼できる少数と深く組みたい",type:"I"},{q:"プレゼンするなら？",a:"熱意で人を動かしたい",b:"論理で人を納得させたい",type:"T"},{q:"ライバルの存在は？",a:"自分の成長に必要不可欠だ",b:"できればいない方がいい",type:"J"},{q:"トラブルが起きたら？",a:"自分が先頭に立って解決する",b:"周囲と協力して分担する",type:"E"},{q:"大切にしているのは？",a:"過去の経験",b:"未来の可能性",type:"N"},{q:"仕事の進め方は？",a:"スピード重視",b:"質重視",type:"J"},{q:"決断の速さは？",a:"即断即決",b:"熟考してから",type:"T"},{q:"集団の中での自分は？",a:"目立つ存在でありたい",b:"黒子として支えたい",type:"E"},{q:"ルールに対しては？",a:"必要なら変えていく",b:"守ることで秩序を保つ",type:"S"},{q:"好きな言葉は？",a:"「開拓」",b:"「統治」",type:"T"},{q:"朝のルーティンは？",a:"分刻みで決まっている",b:"その日の気分で変える",type:"J"},{q:"他人に求めるのは？",a:"スピード感",b:"誠実さ",type:"F"},{q:"大きな決断をする時",a:"自分の勘を信じる",b:"客観的な証拠を集める",type:"S"},{q:"対立が起きたら？",a:"納得するまで議論する",b:"お互いの妥協点を探す",type:"T"},{q:"成功の定義は？",a:"地位や名声を得ること",b:"自分の信念を貫くこと",type:"J"},{q:"人生は？",a:"戦いである",b:"ゲームである",type:"E"}];
    const pathBQuestions = [{q:"自分を見つめる時間は？",a:"毎日欠かさず作りたい",b:"時々で十分だ",type:"I"},{q:"物事の学び方は？",a:"独学で深めたい",b:"誰かに教わりたい",type:"S"},{q:"環境の変化には？",a:"徐々に慣れていきたい",b:"すぐに対応したい",type:"P"},{q:"大切にしたいのは？",a:"自分の感受性",b:"社会的な常識",type:"N"},{q:"趣味に没頭するなら？",a:"一人で極めたい",b:"仲間と共有したい",type:"I"},{q:"判断に迷った時は？",a:"自分の心が落ち着く方を選ぶ",b:"他人がどう思うかを考える",type:"F"},{q:"理想の生活は？",a:"自給自足のようなシンプルさ",b:"便利で賑やかな都会風",type:"S"},{q:"感情の起伏は？",a:"あまり表に出さない",b:"素早く表現する",type:"I"},{q:"計画を立てるのは？",a:"苦手で、流れに身を任せる",b:"好きで、きっちり決めたい",type:"J"},{q:"読書をするなら？",a:"専門的な実用書",b:"物語や詩集",type:"N"},{q:"嫌いな状況は？",a:"注目を浴び続けること",b:"孤独を感じること",type:"I"},{q:"褒められて嬉しいのは？",a:"「独特な感性だね」",b:"「丁寧な仕事だね」",type:"S"},{q:"美しさを感じるのは？",a:"自然のままの姿",b:"整えられた姿",type:"N"},{q:"会話のスタイルは？",a:"聞き役に回ることが多い",b:"自分から話題を振る",type:"I"},{q:"座右の銘にするなら？",a:"「柳に風」",b:"「石の上にも三年」",type:"P"},{q:"人付き合いで疲れたら",a:"完全に一人で閉じこもる",b:"信頼できる一人とだけ話す",type:"I"},{q:"大切にしている持ち物は？",a:"長く使い込んだ愛着のあるもの",b:"最新の便利なもの",type:"S"},{q:"夢や目標は？",a:"心の中に秘めておく",b:"紙に書いて貼る",type:"I"},{q:"約束の時間は？",a:"少し遅れても気にしない",b:"5分前には到着する",type:"P"},{q:"自分へのご褒美は？",a:"贅沢な静寂の時間",b:"美味しい食事",type:"I"},{q:"物語の結末は？",a:"ハッピーエンドがいい",b:"考えさせられる余韻がいい",type:"F"},{q:"誰かと意見が違ったら？",a:"静かに身を引く",b:"自分の考えを穏やかに伝える",type:"I"},{q:"人生に求めるのは？",a:"深い充足感",b:"確かな安定",type:"N"},{q:"自分を動物に例えるなら？",a:"猫のような自由さ",b:"犬のような忠実さ",type:"P"}];

    let isPathChosen = false, selectedPath = null, step = 0, scores = { E:0, I:0, S:0, N:0, T:0, F:0, J:0, P:0 }, history = [], stream = null, currentZoom = 1.0, currentInsectImg = null;
    let currentFacingMode = "environment";

    function showScreen(id) { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); }
    function startApp() { showScreen('quiz-screen'); renderQuestion(); }
    function renderQuestion() {
        let q; const btn = document.getElementById('back-button');
        if (!isPathChosen) { q = branchQuestion; document.getElementById('status-text').innerText = "Path Choice"; btn.style.visibility = 'hidden'; } 
        else { const list = selectedPath === 'A' ? pathAQuestions : pathBQuestions; q = list[step]; document.getElementById('status-text').innerText = `Analysis: ${step + 1} / 24`; btn.style.visibility = 'visible'; }
        document.getElementById('q-text').innerText = q.q; document.getElementById('btnA').innerText = q.a; document.getElementById('btnB').innerText = q.b;
        document.getElementById('progress').style.width = isPathChosen ? ((step+1)/24*100)+"%" : "4%";
    }
    function handleAnswer(choice) {
        history.push({isPathChosen, selectedPath, step, scores: JSON.parse(JSON.stringify(scores))});
        if (!isPathChosen) { selectedPath = choice; isPathChosen = true; } else { const list = selectedPath === 'A' ? pathAQuestions : pathBQuestions; scores[choice === 'A' ? list[step].type : getOpposite(list[step].type)]++; step++; }
        if (step < 24) renderQuestion(); else showResult();
    }
    function goBack() { if (history.length === 0) return; const last = history.pop(); isPathChosen = last.isPathChosen; selectedPath = last.selectedPath; step = last.step; scores = last.scores; renderQuestion(); }
    function getOpposite(t) { return {E:'I', I:'E', S:'N', N:'S', T:'F', F:'T', J:'P', P:'J'}[t]; }
    
    async function showResult() {
        showScreen('result-screen');
        const mbti = (scores.E>=scores.I?'E':'I')+(scores.S>=scores.N?'S':'N')+(scores.T>=scores.F?'T':'F')+(scores.J>=scores.P?'J':'P');
        document.getElementById('res-mbti').innerText = mbti;

        let key;
        if (selectedPath === 'A') {
            if (scores.T >= 8) key = "A1"; else if (scores.E >= 8) key = "A3"; else if (scores.J >= 8) key = "A2"; else if (scores.S >= 8) key = "A4"; else key = mbti;
        } else {
            if (scores.I >= 8) key = "B1"; else if (scores.S >= 8) key = "B2"; else if (scores.P >= 8) key = "B3"; else if (scores.N >= 8) key = "B4"; else key = mbti;
        }

        const insect = insectDB[key] || insectDB[mbti] || insectDB["ISTJ"];
        document.getElementById('res-name').innerText = insect.name; document.getElementById('res-desc').innerText = insect.desc; document.getElementById('res-intro').innerText = insect.intro;
        
        currentInsectImg = insect.img;
        const ov = document.getElementById('overlay-img');
        ov.src = currentInsectImg;
        ov.style.display = "block";

        try { const r = await fetch(`https://ja.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(insect.wiki)}`); const d = await r.json(); document.getElementById('res-img').src = d.thumbnail ? d.thumbnail.source : ""; } catch(e){}
    }

    async function openCamera() {
        try {
            currentFacingMode = "environment";
            stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: currentFacingMode }, audio: false });
            document.getElementById('video').srcObject = stream;
            showScreen('camera-screen');
        } catch (err) { alert("カメラの起動に失敗しました。カメラの使用を許可してください。"); }
    }

    async function switchCamera() {
        if (stream) {
            stream.getTracks().forEach(track => track.stop());
        }
        currentFacingMode = currentFacingMode === "environment" ? "user" : "environment";
        try {
            stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: currentFacingMode }, audio: false });
            document.getElementById('video').srcObject = stream;
            applyZoom(currentZoom);
        } catch (err) { alert("カメラの切り替えに失敗しました。"); }
    }

    function closeCamera() { if (stream) stream.getTracks().forEach(track => track.stop()); showScreen('result-screen'); }

    function applyZoom(val) {
        currentZoom = val;
        const video = document.getElementById('video');
        const track = stream ? stream.getVideoTracks()[0] : null;
        if (track) {
            const cap = track.getCapabilities();
            if (cap.zoom) {
                track.applyConstraints({ advanced: [{ zoom: val }] });
                video.style.transform = "scale(1)";
            } else {
                video.style.transform = `scale(${val})`;
            }
        }
    }

    // ★ 虫が確実に写るように修正したロジック ★
    function takePhoto() {
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        // ビデオ解像度に合わせる
        canvas.width = video.videoWidth; 
        canvas.height = video.videoHeight;
        
        const sw = canvas.width / currentZoom;
        const sh = canvas.height / currentZoom;
        const sx = (canvas.width - sw) / 2;
        const sy = (canvas.height - sh) / 2;

        // 1. 虫の画像を読み込む
        const insectImg = new Image();
        insectImg.crossOrigin = "anonymous";
        
        // 2. 読み込みが完了してから「描画と保存」のすべてをひとまとめに行う
        insectImg.onload = function() {
            // 背景（カメラ）を描画
            ctx.drawImage(video, sx, sy, sw, sh, 0, 0, canvas.width, canvas.height);
            
            // 虫を描画
            const size = canvas.width * 0.45; 
            const posX = canvas.width - size - 20;
            const posY = canvas.height - size - 60;
            
            ctx.globalCompositeOperation = 'source-over'; 
            ctx.drawImage(this, posX, posY, size, size); // 'this' は insectImg

            // 3. 描画が終わってからBlobとして保存
            canvas.toBlob((blob) => {
                if (!blob) return;
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.href = url;
                link.download = `mushimbol_${Date.now()}.png`;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                setTimeout(() => URL.revokeObjectURL(url), 100);
            }, 'image/png');
        };

        // 4. エラー対策
        insectImg.onerror = function() {
            // 虫の読み込みに失敗してもせめて背景だけは撮る
            ctx.drawImage(video, sx, sy, sw, sh, 0, 0, canvas.width, canvas.height);
            canvas.toBlob((blob) => {
                if (!blob) return;
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.href = url;
                link.download = "mushimbol_no_insect.png";
                link.click();
                setTimeout(() => URL.revokeObjectURL(url), 100);
            }, 'image/png');
        };

        // 5. 最後にsrcを代入してロードを開始させる（キャッシュ回避のクエリ付与）
        insectImg.src = currentInsectImg + '?' + new Date().getTime();
    }
</script>
